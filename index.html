<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上海海港2026赛季赛程日历</title>
    <style>
        :root { --primary: #00aaff; --accent: #ff6600; --bg: #f0f4f8; --card: #ffffff; }
        body { font-family: 'PingFang SC', 'Helvetica Neue', sans-serif; background: var(--bg); color: #333; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; }
        h1 { color: var(--primary); margin: 10px 0 5px; }
        p { color: #666; font-size: 0.9rem; }
        .match-card { background: var(--card); border-radius: 12px; padding: 20px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); border-left: 5px solid var(--primary); }
        .match-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .match-date { font-weight: bold; color: var(--primary); font-size: 1.1rem; }
        .match-round { background: var(--accent); color: #fff; padding: 4px 12px; border-radius: 12px; font-size: 0.8rem; }
        .match-name { text-align: center; font-size: 1.4rem; font-weight: 700; margin: 10px 0; }
        .stadium { text-align: center; color: #777; font-size: 0.9rem; margin-bottom: 10px; }
        .subscribe-section { text-align: center; margin: 40px 0 20px; padding: 20px; background: #fff; border-radius: 12px; }
        .footer { text-align: center; margin-top: 40px; font-size: 0.8rem; color: #999; }
        button { background: var(--primary); color: #fff; border: none; padding: 10px 24px; border-radius: 20px; cursor: pointer; font-size: 1rem; margin: 5px; }
        button:hover { opacity: 0.9; }
        .legend { display: flex; justify-content: center; gap: 20px; margin: 15px 0; font-size: 0.85rem; }
        .legend span { display: flex; align-items: center; gap: 6px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
        .dot-home { background: var(--primary); }
        .dot-away { background: var(--accent); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⚽ 上海海港 2026赛季赛程日历</h1>
            <p>中超联赛 · 自动订阅到手机日历 · 含地图定位</p>
            <div class="legend">
                <span><span class="dot dot-home"></span> 主场</span>
                <span><span class="dot dot-away"></span> 客场</span>
            </div>
        </header>

        <div id="calendar-app">
            加载中...
        </div>

        <div class="subscribe-section">
            <h3>📱 订阅 / 下载日历</h3>
            <p>支持导入 iPhone (iOS)、Android、Google Calendar 及 Outlook。</p>
            <p style="font-size:0.85rem;color:#888;">每场比赛包含地图定位，点击地点可直接导航！</p>
            <button onclick="window.location.href='/shanghai_port_2026.ics'">⬇️ 下载 ICS 日历文件</button>
        </div>
        
        <div class="footer">
            © 2026 Shanghai Port FC Calendar · Powered by Glenman
        </div>
    </div>

    <script>
        // 场馆坐标映射
        const STADIUMS = {
            "Home": { name: "上海浦东足球场", geo: "31.1456,121.6008" },
            "Away-Henan": { name: "郑州航海体育场", geo: "34.7447,113.7278" },
            "Away-Shandong": { name: "济南奥体中心", geo: "36.8280,117.0930" },
            "Away-Beijing": { name: "北京工人体育场", geo: "39.9303,116.4380" },
            "Away-Zhejiang": { name: "杭州黄龙体育中心", geo: "30.2844,120.1367" },
            "Away-Chengdu": { name: "成都凤凰山体育公园", geo: "30.8783,104.0947" },
            "Away-Wuhan": { name: "武汉体育中心", geo: "30.5812,114.1312" },
            "Away-Shenzhen": { name: "深圳大运中心", geo: "22.7156,114.4114" },
            "Away-Shenhua": { name: "上海体育场", geo: "30.6778,121.4394" },
            "Away-Chongqing": { name: "重庆奥体中心", geo: "29.5286,106.4697" },
            "Away-Qingdao-West": { name: "青岛青春足球场", geo: "36.0850,120.3930" },
            "Away-Qingdao-Hainiu": { name: "青岛新华锦体育场", geo: "36.0671,120.3826" },
            "Away-Tianjin": { name: "天津泰达体育场", geo: "39.1469,117.2650" },
            "Away-Dalian": { name: "大连梭鱼湾专业足球场", geo: "38.8630,121.5910" },
            "Away-Liaoning": { name: "沈阳浑南足球训练基地", geo: "41.6230,123.5060" },
            "Away-Yunnan": { name: "云南大学津桥学院", geo: "25.0420,102.7220" },
            "Away-Shenyang": { name: "沈阳浑南足球训练基地", geo: "41.6230,123.5060" },
        };

        function getVenue(venue, opponent) {
            const key = venue === "Home" ? "Home" : "Away-" + opponent;
            return STADIUMS[key] || STADIUMS["Home"];
        }

        function renderCalendar() {
            fetch('/2026-schedule.json')
                .then(r => r.json())
                .then(data => {
                    const container = document.getElementById('calendar-app');
                    container.innerHTML = '';
                    data.matches.forEach((m, i) => {
                        const venue = getVenue(m.venue, m.opponent);
                        const isHome = m.venue === "Home";
                        container.innerHTML += `
                            <div class="match-card" style="border-left-color:${isHome ? 'var(--primary)' : 'var(--accent)'}">
                                <div class="match-info">
                                    <span class="match-date">${m.date} ${m.time}</span>
                                    <span class="match-round">${isHome ? '主' : '客'} · 第${m.match_number}轮</span>
                                </div>
                                <div class="match-name">上海海港 vs ${m.opponent_cn}</div>
                                <div class="stadium">📍 ${venue.name} · <a href="https://maps.apple.com/?ll=${venue.geo}" target="_blank" style="color:var(--primary)">查看地图</a></div>
                            </div>
                        `;
                    });
                })
                .catch(() => {
                    document.getElementById('calendar-app').innerHTML = '<p style="text-align:center;color:#999;">数据加载失败，请刷新重试</p>';
                });
        }
        renderCalendar();
    </script>
</body>
</html>
