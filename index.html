<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 FIFA 世界杯观赛日程表</title>
    <style>
        :root { --primary: #326e55; --accent: #b39cd7; --bg: #f7f7f7; --card: #ffffff; }
        body { font-family: 'PingFang SC', 'Helvetica Neue', sans-serif; background: var(--bg); color: #333; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; }
        h1 { color: var(--primary); margin: 10px 0 5px; }
        p { color: #666; font-size: 0.9rem; }
        .calendar-controls { text-align: center; margin: 20px 0; }
        button { background: var(--primary); color: #fff; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-size: 1rem; margin: 5px; }
        button:hover { opacity: 0.9; }
        .match-card { background: var(--card); border-radius: 12px; padding: 20px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); border-left: 5px solid var(--primary); }
        .group-badge { background: var(--accent); color: #fff; padding: 4px 12px; border-radius: 12px; font-size: 0.8rem; margin-bottom: 10px; display: inline-block; }
        .time-row { display: flex; justify-content: space-between; font-size: 1.1rem; margin-bottom: 15px; }
        .time-beijing { font-weight: bold; color: var(--primary); }
        .match-name { text-align: center; font-size: 1.5rem; font-weight: 700; margin-bottom: 5px; }
        .stadium { text-align: center; color: #777; font-size: 0.9rem; margin-bottom: 20px; }
        .subscribe-section { text-align: center; margin: 40px 0 20px; padding: 20px; background: #fff; border-radius: 12px; }
        .footer { text-align: center; margin-top: 40px; font-size: 0.8rem; color: #999; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏆 2026 FIFA World Cup 🇺🇸🇲🇽🇨🇦</h1>
            <p>观赛日程表 · 北京时间显示 · 自动订阅功能</p>
        </header>

        <div id="calendar-app">
            <!-- 日程卡内容将通过 JS 动态加载 -->
        </div>

        <div class="subscribe-section">
            <h3>📱 订阅/下载日历</h3>
            <p>支持导入 iPhone (iOS)、Android、Google Calendar 及 Outlook。</p>
            <button onclick="window.location.href='/worldcup2026.ics'">下载 ICS 日历文件</button>
        </div>
        
        <div class="footer">
            © 2026 WorldCup2026-Calendar · Powered by Glenman
        </div>
    </div>

    <script>
        const matches = [
            { stage: "小组赛", group: "F组", time: "2026-06-12 14:00", location: "MetLife Stadium", match: "🇺🇸 美国 vs 葡萄牙", stageType: "揭幕战" },
            { stage: "小组赛", group: "E组", time: "2026-06-13 16:00", location: "AT&T Stadium", match: "🇧🇷 巴西 vs 德国", stageType: "强强对话" }
        ];

        function renderCalendar() {
            const container = document.getElementById('calendar-app');
            matches.forEach(m => {
                container.innerHTML += `
                    <div class="match-card">
                        <span class="group-badge">${m.group} | ${m.stage}</span>
                        <div class="match-name">${m.match}</div>
                        <div class="stadium">📍 ${m.location}</div>
                        <div class="time-row">
                            <span>北京时间: <strong>${m.time}</strong></span>
                            <span>${m.stageType}</span>
                        </div>
                        <button onclick="addToCalendar('${m.match}', '${m.time}')">添加到日历</button>
                    </div>
                `;
            });
        }
        renderCalendar();
    </script>
</body>
</html>
